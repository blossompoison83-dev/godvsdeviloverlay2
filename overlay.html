<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>God vs Devil – Gift Battle Overlay</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1280px; height: 720px;
    overflow: hidden; background: #000;
    font-family: 'Cinzel', serif;
    position: relative;
  }

  /* ── Backgrounds ── */
  #bg-devil {
    position: absolute; top: 0; left: 0;
    width: 50%; height: 100%;
    background: linear-gradient(135deg, #1a0000 0%, #5c0000 40%, #b30000 80%, #ff2200 100%);
    transition: background 1.2s ease;
  }
  #bg-god {
    position: absolute; top: 0; right: 0;
    width: 50%; height: 100%;
    background: linear-gradient(135deg, #fff9e6 0%, #ffe680 30%, #ffd700 60%, #87ceeb 100%);
    transition: background 1.2s ease;
  }
  #bg-devil::after { content:'🔥'; font-size:80px; position:absolute; bottom:20%; right:30%; opacity:0.2; animation:floatGlow 3s ease-in-out infinite reverse; }
  #bg-god::after   { content:'✨'; font-size:80px; position:absolute; top:20%; left:30%;   opacity:0.15; animation:floatGlow 4s ease-in-out infinite; }

  @keyframes floatGlow {
    0%,100% { transform:translateY(0) scale(1); }
    50%      { transform:translateY(-20px) scale(1.1); }
  }

  /* ── Figures ── */
  .figure {
    position:absolute; bottom:80px;
    width:45%; height:75%;
    display:flex; align-items:flex-end; justify-content:center;
    font-size:220px; line-height:1;
    user-select:none;
    animation:breathe 5s ease-in-out infinite;
  }
  @keyframes breathe { 0%,100%{transform:scale(1);} 50%{transform:scale(1.03);} }
  #devil-figure { left:0;  filter:drop-shadow(0 0 30px rgba(255,0,0,0.4)); }
  #god-figure   { right:0; filter:drop-shadow(0 0 30px rgba(255,255,100,0.3)); }

  /* ── Labels ── */
  .side-label {
    position:absolute; top:30px;
    font-size:38px; font-weight:900; letter-spacing:6px; text-transform:uppercase;
  }
  #label-devil { left:40px;  color:#ff4444; text-shadow:0 0 20px #ff0000, 0 0 40px #800000; }
  #label-god   { right:40px; color:#fff8c0; text-shadow:0 0 20px #ffd700, 0 0 40px #fff; }

  /* ── Score boxes ── */
  .score-box {
    position:absolute; top:85px;
    background:rgba(0,0,0,0.5); border-radius:12px; padding:6px 22px;
    font-size:48px; font-weight:900; border:2px solid;
  }
  #score-devil { left:40px;  color:#ff4444; border-color:#ff4444; box-shadow:0 0 16px #ff000088; }
  #score-god   { right:40px; color:#ffd700; border-color:#ffd700; box-shadow:0 0 16px #ffd70088; }

  /* ── Center column ── */
  #center-column {
    position:absolute; left:50%; top:0;
    transform:translateX(-50%);
    width:60px; height:100%;
    background:linear-gradient(to bottom,#444,#222,#444);
    z-index:10; box-shadow:0 0 30px rgba(0,0,0,0.8);
  }

  /* ── Bar ── */
  #bar-track {
    position:absolute; left:50%; top:50%;
    transform:translate(-50%,-50%);
    width:700px; height:48px;
    background:rgba(0,0,0,0.6); border-radius:24px;
    border:3px solid rgba(255,255,255,0.2);
    overflow:hidden; z-index:20;
    box-shadow:0 0 20px rgba(0,0,0,0.8);
  }
  #bar-fill-devil {
    position:absolute; left:0; top:0; height:100%;
    background:linear-gradient(90deg,#8b0000,#ff2200);
    transition:width 0.6s cubic-bezier(.4,0,.2,1);
  }
  #bar-fill-god {
    position:absolute; right:0; top:0; height:100%;
    background:linear-gradient(90deg,#ffd700,#fffbe6);
    transition:width 0.6s cubic-bezier(.4,0,.2,1);
  }
  .bar-team-label {
    position:absolute; top:-28px;
    font-size:14px; font-weight:700; letter-spacing:2px;
    color:rgba(255,255,255,0.7);
  }
  .bar-team-label.left  { left:8px;  color:#ff8888; }
  .bar-team-label.right { right:8px; color:#ffe066; }

  #bar-center-dot {
    position:absolute; left:50%; top:50%;
    transform:translate(-50%,-50%);
    width:44px; height:44px;
    background:#fff; border-radius:50%; border:3px solid #ccc;
    z-index:21; box-shadow:0 0 14px rgba(255,255,255,0.8);
    display:flex; align-items:center; justify-content:center;
    font-size:22px;
  }

  /* ── Wins display ── */
  #wins-display {
    position:absolute; bottom:20px; left:50%;
    transform:translateX(-50%);
    display:flex; gap:20px; align-items:center;
    z-index:30; background:rgba(0,0,0,0.6);
    border-radius:16px; padding:8px 24px;
    border:1px solid rgba(255,255,255,0.15);
  }
  .wins-label { color:#aaa; font-size:13px; letter-spacing:2px; }
  #devil-wins { color:#ff4444; font-size:28px; font-weight:900; }
  #god-wins   { color:#ffd700; font-size:28px; font-weight:900; }
  .wins-sep   { color:#555; font-size:22px; }

  /* ── Gift feed ── */
  #gift-feed {
    position:absolute; bottom:80px; left:50%;
    transform:translateX(-50%);
    z-index:30; width:380px;
    display:flex; flex-direction:column; gap:6px; align-items:center;
  }
  .gift-toast {
    background:rgba(0,0,0,0.8); border-radius:20px; padding:6px 18px;
    font-size:15px; font-weight:600; color:#fff; letter-spacing:1px;
    animation:toastIn 0.3s ease, toastOut 0.5s ease 2.5s forwards;
    border:1px solid rgba(255,255,255,0.2);
  }
  @keyframes toastIn  { from{opacity:0;transform:scale(0.8);} to{opacity:1;transform:scale(1);} }
  @keyframes toastOut { to{opacity:0;transform:translateY(-10px);} }

  /* ── Win flash ── */
  #win-flash {
    position:absolute; inset:0; z-index:50;
    display:none; align-items:center; justify-content:center;
    flex-direction:column; gap:20px;
    background:rgba(0,0,0,0.8);
  }
  #win-flash.show { display:flex; animation:flashIn 0.5s ease; }
  @keyframes flashIn { from{opacity:0;} to{opacity:1;} }
  #win-flash-text {
    font-size:72px; font-weight:900; letter-spacing:8px; text-align:center;
    animation:winBounce 0.6s ease;
    text-shadow:0 0 40px currentColor;
  }
  @keyframes winBounce { 0%{transform:scale(0.5);} 70%{transform:scale(1.1);} 100%{transform:scale(1);} }
  #win-flash-sub { font-size:28px; color:rgba(255,255,255,0.7); letter-spacing:4px; }

  /* ── Music start screen ── */
  #music-start {
    position:absolute; inset:0; z-index:200;
    display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:24px;
    background:rgba(0,0,0,0.85);
  }
  #music-start-btn {
    background:linear-gradient(135deg,#ffd700,#fff8c0);
    color:#000; border:none; border-radius:50px;
    padding:20px 60px; font-size:28px; font-weight:900;
    font-family:'Cinzel',serif; letter-spacing:4px;
    cursor:pointer; box-shadow:0 0 40px rgba(255,215,0,0.6);
    animation:pulseBtn 1.5s ease-in-out infinite;
  }
  @keyframes pulseBtn {
    0%,100%{transform:scale(1); box-shadow:0 0 40px rgba(255,215,0,0.6);}
    50%{transform:scale(1.05); box-shadow:0 0 60px rgba(255,215,0,0.9);}
  }
  #music-start p { color:#aaa; font-size:15px; letter-spacing:2px; }

  /* ── Music controls ── */
  #music-controls {
    position:absolute; bottom:60px; right:10px;
    z-index:30; display:flex; flex-direction:column;
    align-items:center; gap:6px;
  }
  .music-btn {
    background:rgba(0,0,0,0.6); border:1px solid rgba(255,255,255,0.2);
    color:#fff; border-radius:8px; padding:5px 10px;
    cursor:pointer; font-size:16px; font-family:monospace;
  }
  .music-btn:hover { background:rgba(255,255,255,0.15); }
  #vol-label { font-size:11px; color:#888; letter-spacing:1px; }

  /* ── Connection status dot ── */
  #status-dot {
    position:absolute; top:12px; left:50%;
    transform:translateX(-50%);
    font-size:11px; color:#555; letter-spacing:2px;
    z-index:30;
  }
  #status-dot.connected { color:#44ff88; }
  #status-dot.error     { color:#ff4444; }

  /* ── Admin panel ── */
  #admin {
    position:fixed; top:0; right:0;
    width:300px; height:100vh;
    background:rgba(10,10,10,0.97);
    border-left:1px solid #333;
    color:#eee; z-index:100;
    overflow-y:auto; padding:20px;
    font-family:monospace;
    transform:translateX(100%);
    transition:transform 0.3s ease;
  }
  #admin.open { transform:translateX(0); }
  #admin-toggle {
    position:fixed; top:50%; right:0;
    transform:translateY(-50%);
    background:#222; border:1px solid #555;
    color:#fff; padding:12px 8px;
    cursor:pointer; z-index:101;
    border-radius:8px 0 0 8px;
    font-size:16px; writing-mode:vertical-rl;
    font-family:monospace; letter-spacing:2px;
  }
  #admin h2 { font-size:13px; color:#ffd700; margin-bottom:14px; letter-spacing:2px; }
  #admin h3 { font-size:11px; color:#888; margin:14px 0 6px; letter-spacing:1px; text-transform:uppercase; }
  .admin-btn {
    display:block; width:100%; padding:9px; margin-bottom:7px;
    border:1px solid #444; border-radius:8px;
    background:#1a1a1a; color:#eee;
    cursor:pointer; font-family:monospace; font-size:12px; text-align:left;
  }
  .admin-btn:hover { background:#2a2a2a; }
  .admin-btn.god   { border-color:#ffd700; color:#ffd700; }
  .admin-btn.devil { border-color:#ff4444; color:#ff4444; }
  .pts-row { display:flex; gap:6px; margin-bottom:8px; }
  .pts-row input { flex:1; background:#111; border:1px solid #444; color:#fff; padding:6px 8px; border-radius:6px; font-family:monospace; font-size:12px; }
  .pts-row button { padding:6px 10px; border-radius:6px; border:1px solid #555; background:#222; color:#eee; cursor:pointer; font-size:12px; }
  #admin-log { margin-top:10px; font-size:11px; color:#666; max-height:150px; overflow-y:auto; border-top:1px solid #222; padding-top:8px; }
  #admin-log div { margin-bottom:3px; }
  .win-stat { display:flex; justify-content:space-between; font-size:12px; padding:4px 0; border-bottom:1px solid #222; }
</style>
</head>
<body>

<!-- Music -->
<audio id="bg-music" loop>
  <source src="https://cdn.pixabay.com/audio/2022/10/16/audio_fdf679db7c.mp3" type="audio/mpeg">
  <source src="https://cdn.pixabay.com/audio/2023/03/15/audio_7985f02de0.mp3" type="audio/mpeg">
</audio>
<!-- Music controls -->
<div id="music-controls">
  <button class="music-btn" onclick="toggleMusic()" id="music-toggle-btn">🔊</button>
  <input type="range" id="vol-slider" min="0" max="100" value="40"
    oninput="setVolume(this.value)"
    style="width:70px; writing-mode:vertical-lr; direction:rtl; height:80px;">
  <span id="vol-label">VOL</span>
</div>

<div id="bg-devil"></div>
<div id="bg-god"></div>
<div class="figure" id="devil-figure">😈</div>
<div class="figure" id="god-figure">👼</div>
<div class="side-label" id="label-devil">DEVIL</div>
<div class="side-label" id="label-god">GOD</div>
<div class="score-box" id="score-devil">0</div>
<div class="score-box" id="score-god">0</div>
<div id="center-column"></div>

<div id="bar-track">
  <div id="bar-fill-devil"></div>
  <div id="bar-fill-god"></div>
  <span class="bar-team-label left">😈 DEVIL</span>
  <span class="bar-team-label right">GOD 👼</span>
</div>
<div id="bar-center-dot">⚔️</div>

<div id="gift-feed"></div>

<div id="wins-display">
  <span class="wins-label">ROUND WINS</span>
  <span id="devil-wins">0</span>
  <span class="wins-sep">vs</span>
  <span id="god-wins">0</span>
  <span class="wins-label">WINS</span>
</div>

<div id="status-dot">● NOT CONNECTED</div>

<div id="win-flash">
  <div id="win-flash-text"></div>
  <div id="win-flash-sub">ROUND COMPLETE — RESETTING</div>
</div>

<button id="admin-toggle" onclick="toggleAdmin()">ADMIN ▶</button>

<div id="admin">
  <h2>🎮 GOD VS DEVIL ADMIN</h2>
  <h3>Connection</h3>
  <div id="conn-status" style="font-size:12px;color:#888;margin-bottom:8px;">Connecting to server...</div>

  <h3>Manual Gifts</h3>
  <button class="admin-btn god"   onclick="applyGift('Rose','god',10)">🌹 Rose → GOD (+10)</button>
  <button class="admin-btn god"   onclick="applyGift('Galaxy','god',50)">🌌 Galaxy → GOD (+50)</button>
  <button class="admin-btn god"   onclick="applyGift('TikTok Universe','god',100)">🌟 Universe → GOD (+100)</button>
  <button class="admin-btn devil" onclick="applyGift('Bomb','devil',30)">💣 Bomb → DEVIL (+30)</button>
  <button class="admin-btn devil" onclick="applyGift('Drama Queen','devil',50)">👸 Drama Queen → DEVIL (+50)</button>
  <button class="admin-btn devil" onclick="applyGift('Fire','devil',40)">🔥 Fire → DEVIL (+40)</button>

  <h3>Custom Points</h3>
  <div class="pts-row">
    <input type="number" id="manual-pts" placeholder="Pts" min="1" max="100" value="10"/>
    <button onclick="applyGift('Manual','god',+document.getElementById('manual-pts').value)">→ GOD</button>
    <button onclick="applyGift('Manual','devil',+document.getElementById('manual-pts').value)">→ DEVIL</button>
  </div>

  <h3>Controls</h3>
  <button class="admin-btn" style="border-color:#888;color:#aaa" onclick="resetRound()">🔄 Reset Round</button>
  <button class="admin-btn" style="border-color:#555;color:#666" onclick="resetAll()">⚠️ Reset Everything</button>

  <h3>Round Wins</h3>
  <div class="win-stat"><span>😈 Devil</span><span id="adm-devil-wins">0</span></div>
  <div class="win-stat"><span>👼 God</span><span id="adm-god-wins">0</span></div>

  <h3>Live Gift Log</h3>
  <div id="admin-log"></div>
</div>

<script>
// ── State ──
const WIN_TARGET = 100;
let godPts = 0, devilPts = 0, godWins = 0, devilWins = 0, locked = false;

// ── WebSocket (auto gift connection) ──
let ws;
function connectWS() {
  ws = new WebSocket('ws://localhost:8080');

  ws.onopen = () => {
    setStatus('connected', '● LIVE — Auto-gifts ON');
    document.getElementById('conn-status').textContent = '✅ Connected to gift server';
    logAdmin('🔗 Connected to gift server');
  };

  ws.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      if (data.type === 'gift') {
        const sender = data.sender || 'Viewer';
        logAdmin(`🎁 ${sender}: ${data.giftName} → ${data.side.toUpperCase()} +${data.points}`);
        applyGift(data.giftName, data.side, data.points, sender);
      }
    } catch(err) {}
  };

  ws.onclose = () => {
    setStatus('error', '● DISCONNECTED — retrying...');
    document.getElementById('conn-status').textContent = '❌ Server offline';
    setTimeout(connectWS, 3000);
  };

  ws.onerror = () => {
    setStatus('error', '● NO SERVER — use manual buttons');
    document.getElementById('conn-status').textContent = '⚠️ Start server.js first';
  };
}

function setStatus(cls, text) {
  const el = document.getElementById('status-dot');
  el.className = cls; el.textContent = text;
}

// ── Apply gift ──
function applyGift(giftName, side, points, sender) {
  if (locked) return;
  points = parseInt(points) || 0;
  if (points <= 0) return;

  if (side === 'god')   godPts   = Math.min(WIN_TARGET, godPts   + points);
  if (side === 'devil') devilPts = Math.min(WIN_TARGET, devilPts + points);

  updateBar();
  showToast(giftName, side, points, sender);
  checkWin();
}

// ── Update bar ──
function updateBar() {
  const dp = Math.min(100, (devilPts / WIN_TARGET) * 100);
  const gp = Math.min(100, (godPts   / WIN_TARGET) * 100);
  document.getElementById('bar-fill-devil').style.width = dp + '%';
  document.getElementById('bar-fill-god').style.width   = gp + '%';
  document.getElementById('score-devil').textContent = devilPts;
  document.getElementById('score-god').textContent   = godPts;
}

// ── Check win ──
function checkWin() {
  if (locked) return;
  if (devilPts >= WIN_TARGET) triggerWin('devil');
  else if (godPts >= WIN_TARGET) triggerWin('god');
}

// ── Trigger win ──
function triggerWin(side) {
  locked = true;
  const flash = document.getElementById('win-flash');
  const text  = document.getElementById('win-flash-text');
  if (side === 'god') {
    godWins++;
    text.textContent = '✨ GOD WINS ✨';
    text.style.color = '#ffd700';
  } else {
    devilWins++;
    text.textContent = '🔥 DEVIL WINS 🔥';
    text.style.color = '#ff2200';
  }
  flash.classList.add('show');
  updateWinCounters();
  logAdmin(`🏆 ${side.toUpperCase()} wins round!`);
  setTimeout(() => { flash.classList.remove('show'); resetRound(); }, 4000);
}

// ── Reset ──
function resetRound() {
  godPts = 0; devilPts = 0; locked = false;
  updateBar(); logAdmin('🔄 Round reset');
}
function resetAll() {
  godWins = 0; devilWins = 0;
  resetRound(); updateWinCounters(); logAdmin('⚠️ Full reset');
}

// ── Win counters ──
function updateWinCounters() {
  document.getElementById('god-wins').textContent      = godWins;
  document.getElementById('devil-wins').textContent    = devilWins;
  document.getElementById('adm-god-wins').textContent  = godWins;
  document.getElementById('adm-devil-wins').textContent= devilWins;
}

// ── Toast ──
function showToast(name, side, pts, sender) {
  const feed = document.getElementById('gift-feed');
  const t = document.createElement('div');
  t.className = 'gift-toast';
  t.style.borderColor = side === 'god' ? '#ffd700' : '#ff4444';
  t.textContent = `${side==='god'?'👼':'😈'} ${sender ? '@'+sender+': ' : ''}${name} +${pts}`;
  feed.prepend(t);
  setTimeout(() => t.remove(), 3200);
}

// ── Admin log ──
function logAdmin(msg) {
  const log = document.getElementById('admin-log');
  const d = document.createElement('div');
  d.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  log.prepend(d);
  if (log.children.length > 40) log.lastChild.remove();
}

// ── Admin toggle ──
function toggleAdmin() {
  const p = document.getElementById('admin');
  p.classList.toggle('open');
  document.getElementById('admin-toggle').textContent =
    p.classList.contains('open') ? 'ADMIN ◀' : 'ADMIN ▶';
}

// ── Keyboard shortcuts ──
document.addEventListener('keydown', e => {
  if (e.key==='a'||e.key==='A') toggleAdmin();
  if (e.key==='r'||e.key==='R') resetRound();
});

// ── Music ──
const music = document.getElementById('bg-music');
let musicPlaying = false;

function startOverlay() {
  music.volume = 0.4;
  music.play().catch(() => {});
  musicPlaying = true;
}

function toggleMusic() {
  const btn = document.getElementById('music-toggle-btn');
  if (musicPlaying) {
    music.pause();
    musicPlaying = false;
    btn.textContent = '🔇';
  } else {
    music.play();
    musicPlaying = true;
    btn.textContent = '🔊';
  }
}

function setVolume(val) {
  music.volume = val / 100;
}

// ── Start ──
updateBar();
connectWS();
logAdmin('🎮 Overlay ready!');

// Auto-start
music.volume = 0.4;
music.play().catch(() => {});
musicPlaying = true;

// Remove start screen if it exists
const startScreen = document.getElementById('music-start');
if (startScreen) startScreen.remove();
